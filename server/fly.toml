# Fly.io config (§7: single shared-cpu-1x VM). Deploy when dogfooding starts:
#   fly launch --copy-config --no-deploy   (creates the app)
#   fly secrets set SUPABASE_JWKS_URL=... ANTHROPIC_API_KEY=... (etc.)
#   fly deploy
app = "kizuna-proxy"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
