name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    name: Swift package tests + app build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Package tests
        working-directory: ios/Packages/TenpoKit
        run: swift test
      - name: App build (simulator, unsigned)
        working-directory: ios
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild -project Tenpo.xcodeproj -scheme Tenpo \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build | tail -5

  server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install + test
        working-directory: server
        run: |
          npm ci
          npm test
